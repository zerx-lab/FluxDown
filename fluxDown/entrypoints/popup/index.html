<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360, initial-scale=1.0">
  <title>FluxDown</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="/icon/fluxdown_logo.png" alt="FluxDown" width="22" height="22">
        <span class="title">FluxDown</span>
      </div>
      <div class="header-right">
        <button class="icon-btn lang-btn" id="langBtn" title="">
          <span class="lang-label">EN</span>
        </button>
        <button class="icon-btn" id="themeBtn" data-i18n-title="header.themeToggle">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span class="status-text" data-i18n="header.checking">Checking...</span>
        </div>
      </div>
    </header>

    <!-- 中部滚动区：header/footer 固定，仅此区域滚动 -->
    <div class="popup-body">
    <!-- Main switch -->
    <section class="section switch-section">
      <div class="row">
        <div class="switch-info">
          <span class="label" data-i18n="switch.label">Download Intercept</span>
          <span class="hint" id="enableHint" data-i18n="switch.enabled">Enabled</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="enableToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="row">
        <div class="switch-info">
          <span class="label" data-i18n="settings.dotVisible">Floating Ball</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="dotVisibleToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <!-- Today's stats -->
    <section class="section stats-section">
      <div class="section-title" data-i18n="stats.title">Today's Stats</div>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-value" id="statSent">0</span>
          <span class="stat-label" data-i18n="stats.sent">Intercepted</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-value" id="statFailed">0</span>
          <span class="stat-label" data-i18n="stats.failed">Failed</span>
        </div>
      </div>
    </section>

    <!-- Quick settings -->
    <section class="section">
      <div class="section-title" data-i18n="settings.title">Quick Settings</div>
      <div class="row">
        <span class="label" data-i18n="settings.interceptMode">Intercept Mode</span>
        <select id="interceptModeSelect">
          <option value="smart" data-i18n="settings.modeSmart">Smart</option>
          <option value="all" data-i18n="settings.modeAll">Intercept All</option>
        </select>
      </div>
      <div class="mode-hint" id="modeHint" data-i18n="settings.hintSmart">Smart detection based on filename, type, and size</div>
      <div class="row">
        <span class="label" data-i18n="settings.minFileSize">Min File Size</span>
        <select id="minSizeSelect">
          <option value="0" selected data-i18n="settings.sizeNoLimit">No limit</option>
          <option value="102400">100 KB</option>
          <option value="524288">512 KB</option>
          <option value="1048576">1 MB</option>
          <option value="5242880">5 MB</option>
          <option value="10485760">10 MB</option>
        </select>
      </div>
      <div class="mode-hint" data-i18n="settings.altClickHint">Alt + Click to bypass interception</div>
    </section>
    <!-- Remote download source -->
    <section class="section">
      <div class="section-title" data-i18n="remote.title">Remote Download Source</div>
      <div class="row">
        <span class="label-help">
          <span class="label" data-i18n="remote.mode">Mode</span>
          <span class="help-icon" id="remoteModeHelp" tabindex="0">?</span>
        </span>
        <select id="remoteModeSelect">
          <option value="off" data-i18n="remote.modeOff">Desktop Only</option>
          <option value="fallback" data-i18n="remote.modeFallback">Desktop First</option>
          <option value="always" data-i18n="remote.modeAlways">Remote Only</option>
        </select>
      </div>
      <div class="row">
        <span class="hint" id="remoteServerSummary"></span>
        <button class="btn-small accent" id="openOptionsBtn" data-i18n="remote.openOptions">Configure Server</button>
      </div>
    </section>
    <!-- Excluded domains -->
    <section class="section">
      <div class="section-header">
        <span class="section-title" data-i18n="domain.title">Excluded Domains</span>
        <div class="section-header-actions">
          <button class="icon-btn small" id="addDomainManualBtn" data-i18n-title="domain.addTitle">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button class="btn-small accent" id="addCurrentDomainBtn" title="">
            <span data-i18n="domain.currentSite">Current Site</span>
          </button>
        </div>
      </div>
      <!-- Domain input (hidden by default) -->
      <div class="ext-input-row hidden" id="domainInputRow">
        <input type="text" id="domainInput" data-i18n-placeholder="domain.placeholder" placeholder="Enter domain, e.g. example.com" autocomplete="off">
        <button class="btn-small confirm" id="domainConfirmBtn" data-i18n="domain.add">Add</button>
        <button class="btn-small cancel" id="domainCancelBtn" data-i18n="domain.cancel">Cancel</button>
      </div>
      <div class="domain-list" id="domainList">
        <div class="empty-hint" id="domainEmptyHint" data-i18n="domain.empty">No excluded domains</div>
        <!-- Dynamically generated -->
      </div>
    </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <button class="link-btn footer-settings" id="openSettingsBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span data-i18n="footer.settings">Options</span>
      </button>
      <div class="footer-right">
        <span id="versionLabel">v&hellip;</span>
        <button class="link-btn" id="resetStatsBtn" data-i18n="stats.reset">Reset Stats</button>
      </div>
    </footer>
  </div>

  <script src="./main.ts" type="module"></script>
</body>
</html>
