# FluxDown QPKG 元数据（QDK qbuild 读取）。
# QPKG_VER 由 CI 打包时 sed 注入真实版本号。

QPKG_NAME="FluxDown"
QPKG_DISPLAY_NAME="FluxDown"
QPKG_VER="0.0.0"
QPKG_AUTHOR="FluxDown"
QPKG_LICENSE="AGPL-3.0"
QPKG_SUMMARY="Blazing fast multi-protocol download manager (HTTP/FTP/BitTorrent/HLS) with web UI"

# 生命周期脚本（start/stop/restart），安装后位于 QPKG 根目录
QPKG_SERVICE_PROGRAM="fluxdown.sh"
QPKG_RC_NUM="101"

# App Center 图标点击直达 Web UI
QPKG_WEBUI="/"
QPKG_WEB_PORT="17800"

# 最低固件版本（QTS 4.3+，覆盖所有在役 x86_64/ARM64 机型）
QTS_MINI_VERSION="4.3.0"
