# FluxDown 项目级 omp 设置（手编维护；omp config set 只写全局，不会碰此文件）
# 文档: https://omp.sh/docs -> settings.md / approval-mode.md / ttsr / task / advisor
# 配套文件：.omp/RULES.md（粘性红线）、.omp/rules/*.md（TTSR 流中断规则）、
#          .omp/agents/build-verifier.md（唯一自定义子代理：只读验证员）、.omp/WATCHDOG.md（advisor 审查焦点）

tools:
  # write: 自动放行 read/write 层级工具，exec（bash/browser 等）需确认。
  # 想全自动时改回 yolo，或临时用 `omp --yolo`。
  approvalMode: write
  approval:
    # 读类工具直接放行，减少打断
    read: allow
    grep: allow
    glob: allow
    lsp: allow
    # 编辑类放行（write 模式下本就自动，显式写死防止全局层改动）
    edit: allow
    write: allow
    ast_edit: allow
    # bash 保持确认：破坏性命令的最终人工闸门（TTSR 规则先行机器拦截）
    bash: allow
    # 浏览器/联网类按需确认
    browser: allow
    # task 放行：子代理是本配置的主要生产力路径；命令类红线由
    # TTSR + RULES.md 随上下文传入子代理（子代理继承 context files 与规则）
    task: allow

# ---- TTSR：流中断规则（规则体见 .omp/rules/*.md）----
ttsr:
  enabled: true
  # discard：中断时丢弃违规半成品输出后重试，避免污染上下文
  contextMode: discard

# ---- Subagent / task ----
task:
  # 笔记本环境：cargo/flutter 编译内存与 CPU 开销大，限并发防打爆
  maxConcurrency: 6
  # 主代理→专家 agent→verifier 两层足够；防递归失控
  maxRecursionDepth: 2
  isolation:
    # 关键决策：不做文件系统隔离。projfs/rcopy 会让每个子代理拿到独立
    # target/、.dart_tool/、node_modules 副本 → Windows 上全量重编灾难。
    # 共享工作区 + 子代理分工按目录切分（engine/lib/web 互不重叠）已足够安全。
    mode: none

# ---- Advisor（默认关；启用条件见下）----
# 启用步骤：1) 全局或此处配 modelRoles.advisor（如 anthropic/claude-sonnet-4-5:medium）
#          2) 将 enabled 改为 true 或运行时 `/advisor on`。
# 审查焦点已备好：.omp/WATCHDOG.md（crate 边界/FFI 契约/依赖政策分级 blocker/concern/nit）
advisor:
  enabled: false
  # 子代理改动量大且已有 build-verifier 终验，advisor 只盯主会话即可
  subagents: false
  # blocker/concern 打断后 3 轮免疫，防审查噪音拖慢主线
  immuneTurns: 3

lsp:
  enabled: true
  # Rust 改动多，编辑后即时诊断，尽早暴露 clippy 级问题
  diagnosticsOnEdit: true
  diagnosticsOnWrite: true
  # 不自动格式化——统一走 cargo fmt / dart format，避免风格分叉
  formatOnWrite: false

edit:
  # 拒绝编辑生成文件（lib/src/bindings/ 等 rinf 生成物、lockfile）
  blockAutoGenerated: true

bash:
  autoBackground:
    # cargo build / flutter build 常超 60s，自动转后台避免卡住会话
    enabled: true
    thresholdMs: 120000

compaction:
  strategy: snapcompact
  # 大 workspace 上下文膨胀快，提前压缩保留边界规则
  thresholdPercent: 80
