name: Auto Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: Auto Triage
    runs-on: ubuntu-latest
    if: "contains(github.event.issue.labels.*.name, 'user-feedback')"
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Search similar issues
        id: search
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract keywords from title: strip emoji/brackets/punctuation, take first 4 words
          KEYWORDS=$(echo "${{ github.event.issue.title }}" \
            | sed 's/[[:punct:]]//g; s/[✨🐛💡🔧📦⚡]//g' \
            | tr ' ' '\n' \
            | grep -v -iE '^\s*$|^(Website|Feedback|the|a|an|is|in|of|for|to|with|and|or|版本|功能|建议|希望|加入|支持)$' \
            | head -4 \
            | tr '\n' ' ' \
            | xargs)

          echo "Keywords: $KEYWORDS"

          # Search issues (gh search queries both title and body by default)
          if [ -n "$KEYWORDS" ]; then
            gh search issues \
              --repo ${{ github.repository }} \
              --label user-feedback \
              --state open \
              --json number,title,body \
              --limit 10 \
              "$KEYWORDS" > /tmp/candidates.json 2>/dev/null || echo "[]" > /tmp/candidates.json
          else
            echo "[]" > /tmp/candidates.json
          fi

          # Exclude the current issue from candidates
          CURRENT="${{ github.event.issue.number }}"
          jq --argjson cur "$CURRENT" '[.[] | select(.number != $cur)]' /tmp/candidates.json > /tmp/filtered.json

          echo "Candidates found: $(jq length /tmp/filtered.json)"
          echo "candidates=$(jq -c . /tmp/filtered.json)" >> $GITHUB_OUTPUT

      - name: Triage with Claude
        uses: anthropics/claude-code-action@v1
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          CANDIDATES: ${{ steps.search.outputs.candidates }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash"
          prompt: |
            You are triaging a new GitHub issue for FluxDown, a Rust+Flutter download manager (IDM alternative).

            New issue #${{ github.event.issue.number }}: "${{ github.event.issue.title }}"

            === STEP 1: CHECK [keep-open] MARKER ===
            Run: gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body -q .body

            If the issue body contains the text `[keep-open]`, set keep_open=true (will affect close behavior later).

            === STEP 2: DUPLICATE CHECK ===
            Pre-filtered similar issues (searched by keyword, title+body indexed):
            $CANDIDATES

            If the candidates list is empty, skip to STEP 3B.

            For each candidate, compare BOTH title AND body against the new issue.
            Be conservative: only mark as duplicate if they describe the EXACT same specific problem or request.
            Similar topics are NOT duplicates (e.g. two different download bugs are not the same unless the root cause is identical).

            === STEP 3A: IF DUPLICATE ===
            First, decide which issue to KEEP and which to CLOSE based on description quality:
            - Fetch the existing duplicate's body: gh issue view <existing_number> --repo ${{ github.repository }} --json body,title
            - Compare both issues on: completeness of description, reproduction steps, version info, screenshots/logs attached, clarity
            - The issue with MORE complete and accurate information should be KEPT (stays open)
            - The issue with LESS information should be CLOSED

            Case A — New issue (#${{ github.event.issue.number }}) is LESS complete (close it):
              gh issue edit ${{ github.event.issue.number }} --repo ${{ github.repository }} --add-label duplicate
              gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "..."
              Close ONLY IF keep_open=false:
                gh issue close ${{ github.event.issue.number }} --repo ${{ github.repository }} --reason "not planned"

            Case B — Existing issue is LESS complete (close it, keep new):
              gh issue edit <existing_number> --repo ${{ github.repository }} --add-label duplicate
              gh issue comment <existing_number> --repo ${{ github.repository }} --body "与 #${{ github.event.issue.number }} 重复，且描述不如新 issue 完整，已关闭。"
              gh issue close <existing_number> --repo ${{ github.repository }} --reason "not planned"
              Also comment on new issue explaining it was kept as the more complete report.

            In both cases: mention in comments which issue is being kept and why.
            [keep-open] override: if the issue to be closed has [keep-open] in its body, skip closing it and note this in the comment.

            === STEP 3B: IF NOT DUPLICATE — Add to Project Board ===
            Use PROJECT_TOKEN env var for all GraphQL project operations.

            1. Query project fields:
                gh api graphql --header "Authorization: Bearer $PROJECT_TOKEN" -f query='
                  { user(login:"zerx-lab") { projectV2(number:4) {
                      id
                      fields(first:20) { nodes {
                        ... on ProjectV2SingleSelectField { id name options { id name } }
                      }}
                  }}}'

            2. Add issue to project (addProjectV2ItemById, node_id: ${{ github.event.issue.node_id }})
            3. Set Status = "Todo"
            4. Set Priority:
               - P0 Critical: crash / data loss / app won't start / download corrupted
               - P1 High: major feature broken, many users affected
               - P2 Medium: normal bug or feature request
               - P3 Low: minor UX, cosmetic, niche
            5. Set Module (most relevant):
               - Rust Engine: download speed, segmentation, HTTP core, resume, speed limiter
               - Flutter UI: UI layout, theme, dialog, buttons, font, window
               - Extension: Chrome/Firefox/Edge extension, NMH, download interception
               - BT: BitTorrent, magnet links, DHT, tracker
               - HLS/DASH: M3U8, streaming, media sniffing
               - FTP: FTP protocol
               - Website: official site, feedback page, changelog
               - Infra: installer, startup, auto-update, env/dependency issues

            6. Post a comment in Chinese confirming triage, and include this tip:
               > 💡 提示：如果你的 issue 即使被判定为重复项也希望保持开启状态，可以在 issue 正文中加入 `[keep-open]` 标识。
