name: Build Browser Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-extension:
    name: Build FluxDown Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Set extension version from tag
        working-directory: fluxDown
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/version: '.*'/version: '$VERSION'/" wxt.config.ts
          echo "Updated extension version to $VERSION"
          grep '"version"' package.json
          grep 'version:' wxt.config.ts

      - name: Install dependencies
        run: npm ci
        working-directory: fluxDown

      - name: Build Chrome extension
        run: npm run build
        working-directory: fluxDown

      - name: Build Firefox extension
        run: npm run build:firefox
        working-directory: fluxDown

      - name: Package extensions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p build/extension/FluxDown-${VERSION}-extension
          cp -r fluxDown/.output/chrome-mv3 build/extension/FluxDown-${VERSION}-extension/chrome
          cp -r fluxDown/.output/firefox-mv3 build/extension/FluxDown-${VERSION}-extension/firefox
          cd build/extension
          zip -r FluxDown-${VERSION}-extension.zip FluxDown-${VERSION}-extension/
          ls -la

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: FluxDown-${{ steps.version.outputs.VERSION }}-extension
          path: build/extension/FluxDown-${{ steps.version.outputs.VERSION }}-extension/
          if-no-files-found: error

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/extension/FluxDown-*.zip
          draft: false
          generate_release_notes: true
