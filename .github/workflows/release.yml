            HAS_NOTES=false
          fi
          cp RELEASE_NOTES.md RELEASE_NOTES.orig.md
          echo "has_notes=$HAS_NOTES" >> "$GITHUB_OUTPUT"
          echo "── Release notes (git-cliff) ──"
          cat RELEASE_NOTES.md

      # ── 将混合语言的 cliff 输出翻译为中英双语（与 release-app 同一套规则，直接调用 CLI）──
      - name: Translate release notes (bilingual)
        if: steps.finalize.outputs.has_notes == 'true'
        continue-on-error: true
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TRANSLATE_PROMPT: |
            RELEASE_NOTES.md 是 git-cliff 从 Conventional Commits 生成的更新日志，条目语言混杂（部分中文、部分英文）。
            请将其改写为中英双语版本，并覆盖写回 RELEASE_NOTES.md。

            输出文件格式（严格遵守，无代码块围栏、无任何额外说明文字）：

            <!-- fluxdown:lang:zh -->
            （完整中文版）

            <!-- fluxdown:lang:en -->
            （完整英文版）

            规则：
            - 两个区块的结构与原文件一一对应：保留 "## [x.y.z] - 日期" 版本标题、"### <emoji> 分组" 标题、"- *(scope)* 描述" 条目格式与条目顺序，emoji 原样保留
            - 中文区块：分组标题与所有条目描述均为中文（如 "### 🚀 新功能"、"### 🐛 问题修复"）
            - 英文区块：分组标题与所有条目描述均为英文（如 "### 🚀 Features"、"### 🐛 Bug Fixes"）
            - *(scope)* 括号内的 scope 名、反引号内的代码、issue/PR 编号（#123）、专有名词（HLS、DASH、aria2、Rinf、BT tracker 等）原样保留，不翻译
            - 只修改 RELEASE_NOTES.md，不改动其他任何文件
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "$TRANSLATE_PROMPT" --allowedTools "Read,Write,Edit"

      # 校验翻译结果：缺少双语标记则回退到原始 git-cliff 输出
      - name: Validate translated notes
        if: steps.finalize.outputs.has_notes == 'true'
        shell: bash
        run: |
          if grep -q '<!-- fluxdown:lang:zh -->' RELEASE_NOTES.md \
            && grep -q '<!-- fluxdown:lang:en -->' RELEASE_NOTES.md; then
            echo "Bilingual translation OK"
          else
            echo "::warning::Translated notes missing language markers — falling back to original git-cliff output"
            cp RELEASE_NOTES.orig.md RELEASE_NOTES.md
          fi
          rm -f RELEASE_NOTES.orig.md
          echo "── Final release notes ──"
          cat RELEASE_NOTES.md

      - name: Download Android APK artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-apk
          path: release-assets/
          merge-multiple: true

      - name: Generate SHA256 checksums
