        run: sha256sum * > SHA256SUMS.txt

      - name: List release assets
        run: ls -la release-assets/

      # make_latest=false：组件 release 不抢占 GitHub /releases/latest
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ steps.version.outputs.VERSION }}
          name: FluxDown Mobile v${{ steps.version.outputs.VERSION }}
          files: release-assets/*
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          draft: false
          make_latest: "false"

  # ── Release 后置 Job: 自动更新自托管 Scoop bucket manifest（bucket/fluxdown.json）──
  # 桌面客户端 release 成功后，用本次版本号 + 真实 SHA256 刷新 manifest 并回推默认分支，
  # 使 `scoop bucket add fluxdown https://github.com/zerx-lab/FluxDown` 的用户始终装到最新版。
  # 官方 bucket（ScoopInstaller/Extras）另有 excavator 机器人按 autoupdate 段自动更新，无需此 job。
  update-scoop-bucket:
    name: Update Scoop Bucket
    runs-on: ubuntu-latest
    needs: release-app
    permissions:
      contents: write

    steps:
      # 检出默认分支（非 tag 的 detached HEAD），以便 commit 回推
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # 从已发布的 release 资产下载 Windows 便携版，计算真实 SHA256 并写入 manifest
      - name: Update manifest (version + url + hash)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          set -euo pipefail
          BASE="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          X64_ZIP="FluxDown-${VERSION}-windows-x64-portable.zip"
          ARM_ZIP="FluxDown-${VERSION}-windows-arm64-portable.zip"
          curl -fsSL -o x64.zip "${BASE}/${X64_ZIP}"
          curl -fsSL -o arm.zip "${BASE}/${ARM_ZIP}"
          X64_HASH=$(sha256sum x64.zip | awk '{print $1}')
          ARM_HASH=$(sha256sum arm.zip | awk '{print $1}')
          rm -f x64.zip arm.zip
          python3 - <<PY
          import json
          p = "bucket/fluxdown.json"
          m = json.load(open(p))
          v = "${VERSION}"
          base = "${BASE}"
          m["version"] = v
          m["architecture"]["64bit"]["url"] = f"{base}/${X64_ZIP}"
          m["architecture"]["64bit"]["hash"] = "${X64_HASH}"
          m["architecture"]["arm64"]["url"] = f"{base}/${ARM_ZIP}"
          m["architecture"]["arm64"]["hash"] = "${ARM_HASH}"
          json.dump(m, open(p, "w"), indent=4, ensure_ascii=False)
          open(p, "a").write("\n")
          PY
          echo "── Updated bucket/fluxdown.json ──"
          cat bucket/fluxdown.json

      - name: Commit & push manifest
        run: |
          set -euo pipefail
          if git diff --quiet -- bucket/fluxdown.json; then
            echo "Manifest already up to date — nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/fluxdown.json
          git commit -m "chore(scoop): bump manifest to v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  # ── 最终 Job: 清理 GitHub Actions Artifact，仅保留当前 tag 这一组 ──
  # 原因：Free 账号 artifact 配额仅 500MB，每次 release 会上传 ~400MB
  # Release 资产已独立存储在 GitHub Release，artifact 只是 CI 中间产物可安全清理
  # always()：无论哪些组件 release 被跳过/失败都执行清理，失败不阻断（continue-on-error）
  cleanup-artifacts:
    name: Cleanup CI Artifacts
    runs-on: ubuntu-latest
    needs: [release-app, release-extension, release-server, release-mobile, release-cli]
    if: ${{ always() && !cancelled() }}

    steps:
      - name: Cleanup GitHub Actions artifacts (keep current tag only)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          echo "🧹 Artifact cleanup: keeping only artifacts from tag ${CURRENT_TAG}"

          # 列出所有 artifact，过滤掉当前 tag 的，删除其余所有
          # workflow_run.head_branch 在 tag 推送时等于 tag 名（v0.1.43 这样）
          DELETE_IDS=$(gh api --paginate \
            repos/${{ github.repository }}/actions/artifacts \
            -q ".artifacts[] | select(.workflow_run.head_branch != \"${CURRENT_TAG}\") | .id")

          if [ -z "$DELETE_IDS" ]; then
            echo "✅ No old artifacts to delete"
            exit 0
          fi

          DELETE_COUNT=$(echo "$DELETE_IDS" | wc -l)
          echo "Will delete ${DELETE_COUNT} old artifact(s)"

          # 串行删除避免触发 GitHub TLS 限流（之前并发 8 大量 timeout）
          FAIL=0
          for id in $DELETE_IDS; do
            if gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/${id} 2>/dev/null; then
              echo "  🗑️  Deleted artifact ${id}"
            else
              echo "  ⚠️  Failed to delete artifact ${id}"
              FAIL=$((FAIL+1))
            fi
          done

          echo "✅ Artifact cleanup complete. Deleted $((DELETE_COUNT-FAIL))/${DELETE_COUNT}"
          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️  ${FAIL} deletion(s) failed (will be retried next release)"
          fi
